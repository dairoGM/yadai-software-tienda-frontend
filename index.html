<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YA&amp;DAI Software</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      #yadai-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: var(--bg, #0A0A0F);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.25rem;
        transition: opacity 0.35s ease;
      }
      #yadai-splash.fade-out { opacity: 0; pointer-events: none; }
      #yadai-splash .splash-logo {
        width: 52px; height: 52px; border-radius: 16px;
        background: linear-gradient(135deg, #6C63FF, #00D4AA);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 32px rgba(108,99,255,0.35);
      }
      #yadai-splash .brand {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700; font-size: 1.1rem;
        background: linear-gradient(135deg, #fff, #8B85FF);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #yadai-splash .splash-bar {
        width: 120px; height: 2px;
        background: rgba(108,99,255,0.15);
        border-radius: 2px; overflow: hidden;
      }
      #yadai-splash .splash-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #6C63FF, #00D4AA);
        animation: splash-bar 1.4s ease-in-out infinite;
      }
      @keyframes splash-bar {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
    </style>
  </head>
  <body>
    <div id="yadai-splash">
      <div class="splash-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16,18 22,12 16,6"/>
          <polyline points="8,6 2,12 8,18"/>
        </svg>
      </div>
      <div class="brand">YA&amp;DAI Software</div>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Apply saved theme before render to avoid flash
      (function() {
        var t = localStorage.getItem('tienda_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <script>
      // Splash se cierra llamando window.hideSplash() desde React
      window.hideSplash = function() {
        var s = document.getElementById('yadai-splash');
        if (!s) return;
        s.classList.add('fade-out');
        setTimeout(function() { if (s.parentNode) s.parentNode.removeChild(s); }, 380);
      };
      // Fallback: si React tarda más de 8s, cerrar igual
      setTimeout(window.hideSplash, 8000);
    </script>
  </body>
</html>
